<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { padding: 1.5rem; background-color: #f8f9fa; font-family: sans-serif; }
      .container { text-align: center; }
      .hidden { display: none; }
      .option-box { text-align: left; margin-bottom: 20px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="selectionState">
        <h6 class="mb-3">PDFにするシートを選択</h6>
        <div class="option-box">
          <div class="form-check mb-2">
            <input class="form-check-input" type="radio" name="sheetSelect" id="opt1" value="日報" checked>
            <label class="form-check-label" for="opt1">日報</label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input" type="radio" name="sheetSelect" id="opt2" value="シリンダー日報">
            <label class="form-check-label" for="opt2">シリンダー日報</label>
          </div>
        </div>
        <button class="btn btn-primary w-100" onclick="startPdfCreation()">PDFを作成する</button>
      </div>

      <div id="loadingState" class="hidden">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3">PDFを生成中...</p>
      </div>

      <div id="resultState" class="hidden"></div>
    </div>

    <script>
      function startPdfCreation() {
        // 選択されたシート名を取得
        const selectedSheet = document.querySelector('input[name="sheetSelect"]:checked').value;

        // UIの切り替え
        document.getElementById('selectionState').classList.add('hidden');
        document.getElementById('loadingState').classList.remove('hidden');

        // GASの関数を実行 (関数名を createManualPdf に変更しています)
        google.script.run
          .withSuccessHandler(onSuccess)
          .withFailureHandler(onFailure)
          .createManualPdf(selectedSheet);
      }

      function onSuccess(pdfObject) {
        if (pdfObject.error) {
          onFailure({ message: pdfObject.error });
          return;
        }

        // ダウンロード実行
        const link = document.createElement('a');
        link.href = 'data:application/pdf;base64,' + pdfObject.data;
        link.download = pdfObject.filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showResult('✅ ダウンロード開始', '完了しました。');
        
        // サイドバーの場合は自動で閉じると使いにくい場合があるため、閉じる処理はユーザー任せにするか、必要なら以下を有効化してください
        // setTimeout(() => { google.script.host.close(); }, 4000);
      }

      function onFailure(error) {
        showResult('❌ エラー', error.message);
      }
      
      function showResult(title, message) {
        document.getElementById('loadingState').classList.add('hidden');
        const resultState = document.getElementById('resultState');
        resultState.classList.remove('hidden');
        resultState.innerHTML = `
          <h5 class="mb-2">${title}</h5>
          <p class="text-muted small">${message}</p>
          <button class="btn btn-sm btn-secondary mt-2" onclick="resetView()">戻る</button>
        `;
      }

      function resetView() {
        document.getElementById('resultState').classList.add('hidden');
        document.getElementById('selectionState').classList.remove('hidden');
      }
    </script>
  </body>
</html>
